services:
  webhook-inspector:
    build: .
    # Provide WEBHOOK_SECRET / USE_TUNNEL / PORT via a local .env.
    env_file:
      - path: .env
        required: false
    # Port mapping matters when USE_TUNNEL=false (hit it directly on localhost).
    # With the tunnel on, cloudflared dials out and this mapping is harmless.
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
